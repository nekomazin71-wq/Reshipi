<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俺のレシピ</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
  max-width: 500px;
  margin: auto;
}

h2 { text-align: center; }

/* ===== タイトル ===== */
.title-area {
  text-align: center;
  margin-bottom: 10px;
}
.title-area input {
  width: 70%;
  padding: 10px;
  font-size: 18px;
}

/* ===== 入力 ===== */
.input-area {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}
.input-area input:nth-child(1){ flex:2; }
.input-area input:nth-child(2){ flex:1; }
.input-area select{ flex:1; }
.input-area button{ flex:1.2; }

/* ===== 立体ボタン ===== */
button {
  border-radius: 10px;
  border: none;
  cursor: pointer;
  padding: 10px;

  background: linear-gradient(145deg,#ffffff,#dcdcdc);
  box-shadow:
    4px 4px 8px rgba(0,0,0,0.2),
    -2px -2px 6px rgba(255,255,255,0.7);

  transition: all 0.15s ease;
}
button:active {
  transform: translateY(2px);
  box-shadow:
    2px 2px 4px rgba(0,0,0,0.2),
    -1px -1px 3px rgba(255,255,255,0.7);
}

/* 追加 */
.input-area button {
  background: linear-gradient(145deg,#ff7043,#ff3d00);
  color: white;
  font-weight: bold;
}

/* ===== 人数 ===== */
.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin: 10px 0;
}
.buttons button {
  background: linear-gradient(145deg,#eee,#ccc);
}
.buttons button.active {
  background: linear-gradient(145deg,#ff7043,#ff3d00);
  color: white;
}

/* ===== テーブル ===== */
#ingredients {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}
#ingredients th,#ingredients td {
  padding: 10px;
  text-align: center;
  border: 2px solid #ccc;
  font-size: 16px;
}
#ingredients tr:nth-child(even){ background:#fafafa; }

.completed {
  opacity: 0.4;
  text-decoration: line-through;
}

/* 操作ボタン */
td button:nth-child(1){background:#66bb6a;color:#fff;}
td button:nth-child(2){background:#42a5f5;color:#fff;}
td button:nth-child(3){background:#ef5350;color:#fff;}

/* ===== CSV 横並び ===== */
.csv-area {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.csv-area > * {
  flex: 1;
}

/* 出力 */
.csv-area button:first-child {
  background:#66bb6a;
  color:white;
  font-weight:bold;
}

/* 読み込み（擬似ボタン） */
.file-label {
  background:#42a5f5;
  color:white;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* リセット */
.reset-btn {
  background:#ef5350;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>俺のレシピ　〇人だったらどうなる</h2>

<div class="title-area">
  俺の <input id="title" placeholder="ぷりん" oninput="saveToLocal()">
</div>

<div class="input-area">
  <input id="name" placeholder="食材">
  <input id="amount" type="number" placeholder="量">
  <select id="unit">
    <option value="g">g</option>
    <option value="個">個</option>
    <option value="cc">cc</option>
    <option value="滴">滴</option>
    <option value="cm">cm</option>
  </select>
  <button onclick="addIngredient()">＋追加</button>
</div>

<table id="ingredients"></table>

<div class="buttons" id="buttons"></div>

<!-- CSV -->
<div class="csv-area">
  <button onclick="exportCSV()">ファイル出力</button>

  <label class="file-label">
    ファイル入力
    <input type="file" accept=".csv" onchange="importCSV(event)" style="display:none">
  </label>

  <button class="reset-btn" onclick="resetRecipe()">リセット</button>
</div>

<script>
let baseIngredients = [];
let currentPeople = 1;

/* 保存 */
function saveToLocal(){
  localStorage.setItem("recipeData", JSON.stringify({
    title: title.value,
    ingredients: baseIngredients,
    people: currentPeople
  }));
}

/* 読み込み */
function loadFromLocal(){
  const data = localStorage.getItem("recipeData");
  if(!data) return;
  const p = JSON.parse(data);
  title.value = p.title || "";
  baseIngredients = p.ingredients || [];
  currentPeople = p.people || 1;
}

/* 追加 */
function addIngredient(){
  const name = document.getElementById("name").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const unit = document.getElementById("unit").value;
  if(!name || isNaN(amount)) return;

  baseIngredients.push({name,amount,unit,checked:false});

  document.getElementById("name").value="";
  document.getElementById("amount").value="";

  render(currentPeople);
  saveToLocal();
}

/* 描画 */
function render(p){
  currentPeople = p;
  let html = `<tr><th></th><th>食材</th><th>量</th><th>操作</th></tr>`;

  baseIngredients.forEach((i,idx)=>{
    let val = i.amount * p;
    val = val % 1 === 0 ? val : val.toFixed(1);

    html += `
    <tr class="${i.checked?'completed':''}">
      <td><input type="checkbox" ${i.checked?'checked':''} onchange="toggleCheck(${idx})"></td>
      <td>${i.name}</td>
      <td>${val} ${i.unit}</td>
      <td>
        <button onclick="moveUp(${idx})">↑</button>
        <button onclick="moveDown(${idx})">↓</button>
        <button onclick="deleteIngredient(${idx})">×</button>
      </td>
    </tr>`;
  });

  ingredients.innerHTML = html;

  document.querySelectorAll("#buttons button")
    .forEach((b,i)=>b.classList.toggle("active",i+1===p));
}

/* 操作 */
function toggleCheck(i){baseIngredients[i].checked=!baseIngredients[i].checked;saveToLocal();render(currentPeople);}
function deleteIngredient(i){baseIngredients.splice(i,1);render(currentPeople);saveToLocal();}
function moveUp(i){if(i===0)return;[baseIngredients[i-1],baseIngredients[i]]=[baseIngredients[i],baseIngredients[i-1]];render(currentPeople);}
function moveDown(i){if(i===baseIngredients.length-1)return;[baseIngredients[i+1],baseIngredients[i]]=[baseIngredients[i],baseIngredients[i+1]];render(currentPeople);}

/* 人数 */
(function(){
  for(let i=1;i<=10;i++){
    const b=document.createElement("button");
    b.textContent=i+"人前";
    b.onclick=()=>render(i);
    buttons.appendChild(b);
  }
})();

/* CSV */
function exportCSV(){
  let csv="食材,量,単位\n";
  baseIngredients.forEach(i=>csv+=`${i.name},${i.amount},${i.unit}\n`);

  // ===== ファイル名作成 =====
  const menu = document.getElementById("title").value || "レシピ";

  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,"0");
  const d = String(now.getDate()).padStart(2,"0");

  const filename = `${menu}_${y}${m}${d}.csv`;

  // ===== ダウンロード =====
  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}

function importCSV(e){
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=()=>{
    baseIngredients=[];
    reader.result.split("\n").slice(1).forEach(l=>{
      const [n,a,u]=l.split(",");
      if(n) baseIngredients.push({name:n,amount:parseFloat(a),unit:u,checked:false});
    });
    render(currentPeople);
    saveToLocal();
  };
  reader.readAsText(file);
}

/* リセット */
function resetRecipe(){
  if(!confirm("リセットする？")) return;
  baseIngredients=[];
  title.value="";
  render(1);
  saveToLocal();
}

/* 起動 */
loadFromLocal();
render(currentPeople);
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("SW登録OK"));
}
</script>
</body>
</html>
