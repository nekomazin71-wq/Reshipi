<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俺のレシピ</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

h2 {
  text-align: center;
}

.title-area {
  text-align: center;
  margin-bottom: 10px;
}

input, select {
  padding: 8px;
}

.input-area {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

/* ★ 食材との間に余白 */
#ingredients {
  margin-top: 15px;
  width: 100%;
  border-collapse: collapse;
}

button {
  padding: 8px;
  border: none;
  border-radius: 6px;
  background-color: #4CAF50;
  color: white;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin: 15px 0;
}

.buttons button.active {
  background-color: #FF5722;
  transform: scale(1.1);
}

/* ★ テーブル装飾 */
#ingredients th, #ingredients td {
  padding: 8px;
  text-align: center;
  border: 1px solid #ccc;
}

#ingredients th {
  background-color: #f0f0f0;
}

/* ★ 列幅固定 */
#ingredients td:nth-child(1) { width: 40%; }
#ingredients td:nth-child(2) { width: 30%; }
#ingredients td:nth-child(3) { width: 30%; }

/* ★ 交互色 */
#ingredients tr:nth-child(even) {
  background-color: #fafafa;
}

.csv-area {
  margin-top: 20px;
  text-align: center;
}
</style>
</head>

<body>

<h2>人数分レシピの計算</h2>

<div class="title-area">
  俺の <input id="title" placeholder="カレー" oninput="saveToLocal()">
</div>

<div class="input-area">
  <input id="name" placeholder="食材">
  <input id="amount" type="number" placeholder="量">
  <select id="unit">
    <option value="g">g</option>
    <option value="個">個</option>
    <option value="cc">cc</option>
    <option value="滴">滴</option>
    <option value="cm">cm</option>
  </select>
  <button onclick="addIngredient()">追加</button>
</div>

<table id="ingredients"></table>

<div class="buttons" id="buttons"></div>

<div class="csv-area">
  <button onclick="exportCSV()">CSV出力</button>
  <input type="file" accept=".csv" onchange="importCSV(event)">
</div>

<script>
let baseIngredients = [];
let currentPeople = 1;
const MAX = 10;

// 保存
function saveToLocal() {
  const data = {
    title: document.getElementById("title").value,
    ingredients: baseIngredients
  };
  localStorage.setItem("recipeData", JSON.stringify(data));
}

// 読み込み
function loadFromLocal() {
  const data = localStorage.getItem("recipeData");
  if (!data) return;

  const parsed = JSON.parse(data);
  document.getElementById("title").value = parsed.title || "";
  baseIngredients = parsed.ingredients || [];
}

// 追加
function addIngredient() {
  if (baseIngredients.length >= MAX) {
    alert("最大10個まで");
    return;
  }

  const name = document.getElementById("name").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const unit = document.getElementById("unit").value;

  if (!name || isNaN(amount)) return;

  baseIngredients.push({ name, amount, unit });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";

  render(currentPeople);
  saveToLocal();
}

// 削除
function deleteIngredient(index) {
  baseIngredients.splice(index, 1);
  render(currentPeople);
  saveToLocal();
}

// 並び替え
function moveUp(index) {
  if (index === 0) return;
  [baseIngredients[index - 1], baseIngredients[index]] =
    [baseIngredients[index], baseIngredients[index - 1]];
  render(currentPeople);
  saveToLocal();
}

function moveDown(index) {
  if (index === baseIngredients.length - 1) return;
  [baseIngredients[index + 1], baseIngredients[index]] =
    [baseIngredients[index], baseIngredients[index + 1]];
  render(currentPeople);
  saveToLocal();
}

// 表示
function render(people) {
  currentPeople = people;

  // 人数ボタン色
  const buttons = document.querySelectorAll("#buttons button");
  buttons.forEach((btn, index) => {
    btn.classList.toggle("active", index + 1 === people);
  });

  const table = document.getElementById("ingredients");

  let html = `
    <tr>
      <th>食材</th>
      <th>数量</th>
      <th>操作</th>
    </tr>
  `;

  baseIngredients.forEach((item, index) => {
    html += `
      <tr>
        <td>${item.name}</td>
        <td>${parseFloat((item.amount * people).toFixed(1))} ${item.unit}</td>
        <td>
          <button onclick="moveUp(${index})">↑</button>
          <button onclick="moveDown(${index})">↓</button>
          <button onclick="deleteIngredient(${index})">×</button>
        </td>
      </tr>
    `;
  });

  table.innerHTML = html;
}

// 人数ボタン
function createButtons() {
  const container = document.getElementById("buttons");
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.textContent = i + "人前";
    btn.onclick = () => render(i);
    container.appendChild(btn);
  }
}

// CSV出力
function exportCSV() {
  let csv = "食材,量,単位\n";

  baseIngredients.forEach(item => {
    csv += `${item.name},${item.amount},${item.unit}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  const title = document.getElementById("title").value || "レシピ";
  const date = new Date().toISOString().slice(0,10);

  a.href = url;
  a.download = `${title}_${date}.csv`;
  a.click();

  URL.revokeObjectURL(url);
}

// CSV読み込み
function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split("\n");

    baseIngredients = [];

    lines.slice(1).forEach(line => {
      const [name, amount, unit] = line.split(",");
      if (name && amount && unit) {
        baseIngredients.push({
          name: name,
          amount: parseFloat(amount),
          unit: unit
        });
      }
    });

    render(currentPeople);
    saveToLocal();
  };

  reader.readAsText(file);
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

// 初期化
createButtons();
loadFromLocal();
render(1);
</script>

</body>
</html>
