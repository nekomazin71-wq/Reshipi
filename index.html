<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<title>俺のレシピ - 完全版</title>

<style>
:root {
  --bg-color: #f8f9fa;
  --text-color: #333;
  --card-bg: #ffffff;
  --input-bg: #ffffff;
  --input-border: #ccc;
  --table-header-bg: #444;
  --table-header-text: #fff;
  --table-border: #ccc;
  --row-even-bg: #f2f2f2;
  --input-area-bg: #e1f5fe;
  --input-area-border: #0288d1;
  --btn-default-bg: #f0f0f0;
  --btn-default-text: #333;
  --completed-bg: #ddd;
  --completed-text: #888;
  --icon-color: #555;
  --memo-bg: #fff9c4;
  --memo-border: #fbc02d;
}

[data-theme="dark"] {
  --bg-color: #121212;
  --text-color: #e0e0e0;
  --card-bg: #1e1e1e;
  --input-bg: #2d2d2d;
  --input-border: #444;
  --table-header-bg: #333;
  --table-header-text: #e0e0e0;
  --table-border: #333;
  --row-even-bg: #252525;
  --input-area-bg: #012a4a;
  --input-area-border: #0288d1;
  --btn-default-bg: #333;
  --btn-default-text: #e0e0e0;
  --completed-bg: #2d2d2d;
  --completed-text: #666;
  --icon-color: #ffca28;
  --memo-bg: #332b00;
  --memo-border: #fbc02d;
}

body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
  max-width: 500px;
  margin: auto;
  background: var(--bg-color);
  color: var(--text-color);
  transition: background 0.3s, color 0.3s;
}

h2 { text-align: center; color: var(--text-color); margin-top: 10px; }

/* ダークモード切り替えスイッチ */
.theme-toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 1000;
}
.theme-toggle button {
  background: var(--card-bg);
  border: 1px solid var(--input-border);
  color: var(--icon-color);
  padding: 0;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: all 0.3s;
}
.theme-toggle svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

.title-area {
  text-align: center;
  margin-bottom: 15px;
}
.title-area input {
  width: 70%;
  padding: 10px;
  font-size: 18px;
  border: 1px solid var(--input-border);
  border-radius: 8px;
  text-align: center;
  background: var(--input-bg);
  color: var(--text-color);
}

/* 入力エリア（コンパクト版） */
.input-area {
  display: flex;
  gap: 4px;
  margin-bottom: 15px;
  background: var(--input-area-bg);
  padding: 8px;
  border-radius: 10px;
  border: 1px solid var(--input-area-border);
  align-items: stretch;
}

.input-area input,
.input-area select {
  padding: 10px 4px;
  border: 1px solid var(--input-area-border);
  border-radius: 6px;
  font-size: 15px;
  background: var(--input-bg);
  color: var(--text-color);
  box-sizing: border-box;
}

#name { flex: 3; min-width: 0; }
#amount { flex: 1.5; min-width: 0; text-align: right; }
#unit { flex: 1.5; min-width: 0; }

.input-area button {
  flex: 1.2;
  padding: 0;
  background: #0288d1;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 20px;
  cursor: pointer;
}

.input-area button:active {
  background: #01579b;
  transform: scale(0.95);
}

/* ボタン共通 */
button {
  cursor: pointer;
  transition: transform 0.1s, background 0.3s, color 0.3s;
}
button:active { transform: translateY(2px); }

/* 人数切り替えボタン */
.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin: 15px 0;
}
.buttons button {
  padding: 10px 0;
  border: 1px solid var(--input-border);
  border-radius: 10px;
  background: var(--btn-default-bg);
  color: var(--btn-default-text);
  box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
  font-size: 14px;
  font-weight: 500;
}
.buttons button.active {
  background: linear-gradient(145deg, #ff7043, #ff3d00);
  color: white;
  font-weight: bold;
  border: 1px solid #e64a19;
  box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2);
}

/* テーブル */
#ingredients {
  width: 100%;
  border-collapse: collapse;
  background: var(--card-bg);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  border: 1px solid var(--table-border);
}
#ingredients th {
  background: var(--table-header-bg);
  color: var(--table-header-text);
  padding: 12px 5px;
  font-size: 15px;
  border: 1px solid var(--table-border);
}
#ingredients td {
  padding: 12px 5px;
  border: 1px solid var(--table-border);
  text-align: center;
  font-size: 16px;
}

#ingredients tr:nth-child(even) {
  background-color: var(--row-even-bg);
}

td[onclick^="editNameStart"] {
  font-weight: bold;
  color: var(--text-color);
  text-align: left !important;
  padding-left: 10px !important;
}

.completed {
  background-color: var(--completed-bg) !important;
  color: var(--completed-text);
  text-decoration: line-through;
}

.completed td {
  border-color: var(--input-border);
}

.edit-input {
  width: 90%;
  padding: 8px 4px;
  font-size: 18px;
  border: 2px solid #2196f3;
  border-radius: 4px;
  box-sizing: border-box;
  background: var(--input-bg);
  color: var(--text-color);
}

input[type="number"].edit-input {
  text-align: right;
}

/* 操作ボタン */
.op-btn {
  width: 30px;
  height: 30px;
  line-height: 30px;
  padding: 0;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  margin: 0 2px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
}
.btn-up { background: #66bb6a; }
.btn-down { background: #42a5f5; }
.btn-del { background: #ef5350; }

/* メモ欄 */
.memo-area {
  margin-top: 20px;
  background: var(--memo-bg);
  padding: 12px;
  border-radius: 10px;
  border: 2px dashed var(--memo-border);
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.memo-area label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 14px;
  color: var(--text-color);
}
.memo-area textarea {
  width: 100%;
  height: 120px;
  padding: 8px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: var(--input-bg);
  color: var(--text-color);
  font-size: 15px;
  line-height: 1.5;
  box-sizing: border-box;
  resize: vertical;
}

/* CSV・リセットエリア */
.csv-area {
  display: flex;
  gap: 10px;
  margin-top: 25px;
  margin-bottom: 30px;
}

.csv-area > * {
  flex: 1;
  height: 45px;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.export-btn { background: #43a047; color: white; }
.file-label { background: #1e88e5; color: white; }
.reset-btn { background: #d32f2f; color: white; }

@media (max-width: 480px) {
  .input-area { flex-wrap: wrap; }
  .input-area input, .input-area select { flex: 1 1 40%; }
  .input-area button { flex: 1 1 100%; margin-top: 5px; }
}
</style>
</head>

<body>

<div class="theme-toggle">
  <button type="button" onclick="toggleTheme()" id="theme-btn" title="テーマ切り替え">
    <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
  </button>
</div>

<h2>俺のレシピ</h2>

<div class="title-area">
  俺の <input id="title" placeholder="ぷりん" oninput="saveToLocal()">
</div>

<div class="input-area">
  <input id="name" placeholder="食材">
  <input id="amount" type="number" step="any" placeholder="量">
  <select id="unit">
    <option value="g">g</option>
    <option value="個">個</option>
    <option value="cc">cc</option>
    <option value="ml">ml</option>
    <option value="本">本</option>
    <option value="枚">枚</option>
  </select>
  <button type="button" onclick="addIngredient()">＋</button>
</div>

<table id="ingredients"></table>
<div class="buttons" id="buttons"></div>

<div class="memo-area">
  <label for="memo">料理工程・メモ</label>
  <textarea id="memo" placeholder="作り方のコツや手順をメモ出来ます..." oninput="saveToLocal()"></textarea>
</div>

<div class="csv-area">
  <button type="button" class="export-btn" onclick="exportCSV()">ファイル出力</button>
  <label class="file-label">
    ファイル入力
    <input type="file" accept=".csv" onchange="importCSV(event)" hidden>
  </label>
  <button type="button" class="reset-btn" onclick="resetRecipe()">リセット</button>
</div>

<script>
let baseIngredients = []; 
let currentPeople = 1;
let fileHandle = null; // ファイル保存場所（ハンドル）を保持する変数

/* ===== テーマ管理 ===== */
const sunIcon = `<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>`;
const moonIcon = `<svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>`;

function initTheme() {
  const savedTheme = localStorage.getItem("recipeTheme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  setTheme(savedTheme);
}

function setTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("recipeTheme", theme);
  document.getElementById("theme-btn").innerHTML = theme === "dark" ? sunIcon : moonIcon;
}

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  setTheme(current === "dark" ? "light" : "dark");
}

/* ===== ローカルストレージ ===== */
function saveToLocal() {
  localStorage.setItem("recipeData_v3", JSON.stringify({
    title: document.getElementById("title").value,
    ingredients: baseIngredients,
    people: currentPeople,
    memo: document.getElementById("memo").value
  }));
}

function loadFromLocal() {
  const d = JSON.parse(localStorage.getItem("recipeData_v3") || localStorage.getItem("recipeData_v2") || "{}");
  document.getElementById("title").value = d.title || "";
  baseIngredients = d.ingredients || [];
  currentPeople = d.people || 1;
  document.getElementById("memo").value = d.memo || "";
}

/* ===== 食材追加 ===== */
function addIngredient() {
  const nameEl = document.getElementById("name");
  const amountEl = document.getElementById("amount");
  const unitEl = document.getElementById("unit");

  const n = nameEl.value.trim();
  const a = parseFloat(amountEl.value);
  const u = unitEl.value;

  if (!n) return;
  const amountPerPerson = isNaN(a) ? 0 : (a / currentPeople);

  baseIngredients.push({
    name: n,
    amount: amountPerPerson,
    unit: u,
    checked: false
  });

  nameEl.value = "";
  amountEl.value = "";

  render(currentPeople);
  saveToLocal();
}

/* ===== 描画処理 ===== */
function render(p) {
  currentPeople = p;
  const table = document.getElementById("ingredients");
  
  let html = `<thead><tr><th></th><th>食材</th><th>量</th><th>操作</th></tr></thead><tbody>`;

  baseIngredients.forEach((item, idx) => {
    let displayAmount = item.amount * p;
    const formattedAmount = displayAmount === 0 ? "" : (displayAmount % 1 === 0 ? displayAmount : displayAmount.toFixed(2).replace(/\.?0+$/, ""));

    html += `
    <tr class="${item.checked ? 'completed' : ''}">
      <td><input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${idx})"></td>
      
      <td onclick="editNameStart(${idx})">
        <span id="name-${idx}">${escapeHtml(item.name)}</span>
      </td>
      
      <td onclick="editAmountStart(${idx})">
        <span id="amount-${idx}">${formattedAmount} ${item.unit}</span>
      </td>
      
      <td>
        <button type="button" class="op-btn btn-up" onclick="moveUp(${idx})">↑</button>
        <button type="button" class="op-btn btn-down" onclick="moveDown(${idx})">↓</button>
        <button type="button" class="op-btn btn-del" onclick="deleteIngredient(${idx})">×</button>
      </td>
    </tr>`;
  });

  html += `</tbody>`;
  table.innerHTML = html;

  document.querySelectorAll("#buttons button").forEach((btn, i) => {
    btn.classList.toggle("active", (i + 1) === p);
  });
}

/* ===== インライン編集 ===== */
function editNameStart(i) {
  const el = document.getElementById(`name-${i}`);
  const val = baseIngredients[i].name;
  el.onclick = null;
  el.innerHTML = `<input class="edit-input" value="${escapeHtml(val)}" 
    onfocus="this.select()" 
    onblur="editNameEnd(${i}, this.value)" 
    onkeydown="if(event.key==='Enter') { event.preventDefault(); this.blur(); }">`;
  
  const input = el.querySelector("input");
  input.focus();
  setTimeout(() => input.select(), 50);
}

function editNameEnd(i, val) {
  baseIngredients[i].name = val.trim() || baseIngredients[i].name;
  saveToLocal();
  render(currentPeople);
}

function editAmountStart(i) {
  const el = document.getElementById(`amount-${i}`);
  const currentDisplayVal = baseIngredients[i].amount * currentPeople;
  const formattedVal = currentDisplayVal % 1 === 0 ? currentDisplayVal : currentDisplayVal.toFixed(2).replace(/\.?0+$/, "");
  
  el.onclick = null;
  el.innerHTML = `<input type="number" step="any" class="edit-input" value="${formattedVal}" 
    onfocus="this.select()" 
    onblur="editAmountEnd(${i}, this.value)" 
    onkeydown="if(event.key==='Enter') { event.preventDefault(); this.blur(); }">`;
  
  const input = el.querySelector("input");
  input.focus();
  setTimeout(() => input.select(), 50);
}

function editAmountEnd(i, val) {
  const inputVal = parseFloat(val);
  if (!isNaN(inputVal)) {
    baseIngredients[i].amount = inputVal / currentPeople;
  }
  saveToLocal();
  render(currentPeople);
}

/* ===== 操作系 ===== */
function toggleCheck(i) {
  baseIngredients[i].checked = !baseIngredients[i].checked;
  saveToLocal();
  render(currentPeople);
}

function deleteIngredient(i) {
  if (!confirm("この食材を削除しますか？")) return;
  baseIngredients.splice(i, 1);
  saveToLocal();
  render(currentPeople);
}

function moveUp(i) {
  if (i === 0) return;
  [baseIngredients[i - 1], baseIngredients[i]] = [baseIngredients[i], baseIngredients[i - 1]];
  saveToLocal();
  render(currentPeople);
}

function moveDown(i) {
  if (i === baseIngredients.length - 1) return;
  [baseIngredients[i + 1], baseIngredients[i]] = [baseIngredients[i], baseIngredients[i + 1]];
  saveToLocal();
  render(currentPeople);
}

/* ===== 人数ボタン生成 ===== */
const btnContainer = document.getElementById("buttons");
for (let i = 1; i <= 10; i++) {
  const b = document.createElement("button");
  b.type = "button";
  b.textContent = i + "人";
  b.onclick = () => {
    currentPeople = i;
    saveToLocal();
    render(i);
  };
  btnContainer.appendChild(b);
}

/* ===== CSV連携（File System Access API 対応版） ===== */
async function exportCSV() {
  const title = document.getElementById("title").value || "レシピ";
  const memo = document.getElementById("memo").value || "";
  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  
  let csv = `レシピタイトル,"${title.replace(/"/g, '""')}",\n`;
  csv += "食材,1人分の量,単位\n";
  baseIngredients.forEach(item => {
    const n = `"${item.name.replace(/"/g, '""')}"`;
    const a = item.amount;
    const u = `"${item.unit.replace(/"/g, '""')}"`;
    csv += `${n},${a},${u}\n`;
  });
  
  // 修正：メモ欄の改行コードを一時文字列に置換してエクスポート
  const safeMemo = memo.replace(/\r?\n/g, '\\n').replace(/"/g, '""');
  csv += `メモ,"${safeMemo}",\n`;
  
  const blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8" });

  if ('showSaveFilePicker' in window) {
    try {
      if (!fileHandle) {
        const filename = `${title}_${new Date().toISOString().slice(0,10)}.csv`;
        fileHandle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{
            description: 'CSV Files',
            accept: { 'text/csv': ['.csv'] }
          }]
        });
      }

      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error("API Error, falling back:", err);
      } else {
        return;
      }
    }
  }

  const filename = `${title}_${new Date().toISOString().slice(0,10)}.csv`;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const text = event.target.result;
      const lines = text.split(/\r?\n/);
      let newTitle = "";
      let newMemo = "";
      const newIngredients = [];
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        
        const parts = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
        
        if (i === 0 && parts[0] === "レシピタイトル") {
          // 修正：parts[1]が存在しない場合のエラーを回避
          newTitle = (parts[1] || "").replace(/^"|"$/g, '').replace(/""/g, '"');
          continue;
        }
        
        if (parts[0] === "食材") continue;
        
        if (parts[0] === "メモ") {
          // 修正：改行コードを元に戻す処理を追加 ＆ parts[1]エラー回避
          newMemo = (parts[1] || "").replace(/^"|"$/g, '').replace(/""/g, '"').replace(/\\n/g, '\n');
          continue;
        }
        
        if (parts.length >= 3) {
          const n = parts[0].replace(/^"|"$/g, '').replace(/""/g, '"');
          const a = parseFloat(parts[1]);
          const u = parts[2].replace(/^"|"$/g, '').replace(/""/g, '"');
          newIngredients.push({
            name: n,
            amount: isNaN(a) ? 0 : a,
            unit: u,
            checked: false
          });
        }
      }
      
      // 読み込みデータが一つでもあれば実行
      if (newIngredients.length > 0 || newMemo !== "" || newTitle !== "") {
        if (confirm(`レシピデータを読み込みますか？`)) {
          // 修正：空文字（空のメモ・タイトル）でも必ず上書きする
          document.getElementById("title").value = newTitle;
          document.getElementById("memo").value = newMemo;
          
          baseIngredients = newIngredients;
          fileHandle = null; 
          saveToLocal();
          render(currentPeople);
        }
      } else {
        alert("有効なデータが見つかりませんでした。");
      }
    } catch (err) {
      console.error(err);
      alert("エラーが発生しました。");
    }
    e.target.value = "";
  };
  reader.readAsText(file);
}

function resetRecipe() {
  if (!confirm("リセットしますか？")) return;
  baseIngredients = [];
  document.getElementById("title").value = "";
  document.getElementById("memo").value = "";
  currentPeople = 1;
  fileHandle = null; 
  saveToLocal();
  render(1);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

/* ===== 起動 ===== */
initTheme();
loadFromLocal();
render(currentPeople);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
