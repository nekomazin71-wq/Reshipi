<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俺のレシピ</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
  max-width: 500px;
  margin: auto;
}

h2 { text-align: center; }

.title-area {
  text-align: center;
  margin-bottom: 10px;
}
.title-area input {
  width: 70%;
  padding: 10px;
  font-size: 18px;
}

/* 入力エリア */
.input-area {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.input-area input,
.input-area select {
  flex: 1;
  min-width: 0;
}

.input-area button {
  flex: 1;
  white-space: nowrap;
}

/* ボタン */
button {
  border-radius: 10px;
  border: none;
  cursor: pointer;
  padding: 10px;
  background: linear-gradient(145deg,#ffffff,#dcdcdc);
  box-shadow: 4px 4px 8px rgba(0,0,0,0.2), -2px -2px 6px rgba(255,255,255,0.7);
}
button:active { transform: translateY(2px); }

.input-area button {
  background: linear-gradient(145deg,#ff7043,#ff3d00);
  color: white;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin: 10px 0;
}
.buttons button.active {
  background: linear-gradient(145deg,#ff7043,#ff3d00);
  color: white;
}

#ingredients {
  width: 100%;
  border-collapse: collapse;
}
#ingredients th,#ingredients td {
  padding: 8px;
  border: 1px solid #ccc;
  text-align: center;
}

.completed {
  opacity: 0.4;
  text-decoration: line-through;
}

/* CSVエリア */
.csv-area {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.csv-area > * {
  flex: 1;
  height: 45px;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

.csv-area button:nth-child(1) {
  background: linear-gradient(145deg,#66bb6a,#43a047);
  color: white;
}

.file-label {
  background:#42a5f5;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.reset-btn {
  background:#ef5350;
  color:white;
}

/* スマホ */
@media (max-width: 480px) {
  .input-area {
    flex-wrap: wrap;
  }

  .input-area input,
  .input-area select,
  .input-area button {
    flex: 1 1 100%;
  }
}

/* 操作ボタン色 */
td button {
  padding: 6px 8px;
  font-size: 14px;
}

/* 上 */
td button:nth-child(1) {
  background:#66bb6a;color:#fff;}

/* 下 */
td button:nth-child(2) {
  background:#42a5f5;color:#fff;}

/* 削除 */
td button:nth-child(3) {
  background:#ef5350;color:#fff;}

</style>
</head>

<body>

<h2>俺のレシピ</h2>

<div class="title-area">
  俺の <input id="title" placeholder="ぷりん">
</div>

<div class="input-area">
  <input id="name" placeholder="食材">
  <input id="amount" type="number" placeholder="量">
  <select id="unit">
    <option>g</option>
    <option>個</option>
    <option>cc</option>
  </select>
  <button onclick="addIngredient()">＋追加</button>
</div>

<table id="ingredients"></table>
<div class="buttons" id="buttons"></div>

<div class="csv-area">
  <button onclick="exportCSV()">ファイル出力</button>
  <label class="file-label">
    ファイル入力
    <input type="file" accept=".csv" onchange="importCSV(event)" hidden>
  </label>
  <button class="reset-btn" onclick="resetRecipe()">リセット</button>
</div>

<script>
let baseIngredients = [];
let currentPeople = 1;

/* 保存 */
function saveToLocal(){
  localStorage.setItem("recipeData", JSON.stringify({
    title: document.getElementById("title").value,
    ingredients: baseIngredients,
    people: currentPeople
  }));
}

/* 読み込み */
function loadFromLocal(){
  const d = JSON.parse(localStorage.getItem("recipeData")||"{}");
  document.getElementById("title").value = d.title || "";
  baseIngredients = d.ingredients || [];
  currentPeople = d.people || 1;
}

/* 追加（完全修正） */
function addIngredient(){
  const n = document.getElementById("name").value;
  const a = parseFloat(document.getElementById("amount").value);
  const u = document.getElementById("unit").value;

  if(!n || isNaN(a)) return;

  baseIngredients.push({name:n,amount:a,unit:u,checked:false});

  document.getElementById("name").value="";
  document.getElementById("amount").value="";

  render(currentPeople);
  saveToLocal();
}

/* 描画 */
function render(p){
  currentPeople=p;
  let html=`<tr><th></th><th>食材</th><th>量</th><th>操作</th></tr>`;

  baseIngredients.forEach((i,idx)=>{
    let val=(i.amount*p);
    val = val%1===0?val:val.toFixed(1);

    html+=`
    <tr class="${i.checked?'completed':''}">
      <td><input type="checkbox" ${i.checked?'checked':''} onchange="toggleCheck(${idx})"></td>

      <td onclick="editNameStart(${idx})">
        <span id="name-${idx}">${i.name}</span>
      </td>

      <td onclick="editAmountStart(${idx})">
        <span id="amount-${idx}">${val} ${i.unit}</span>
      </td>

      <td>
        <button onclick="moveUp(${idx})">↑</button>
        <button onclick="moveDown(${idx})">↓</button>
        <button onclick="deleteIngredient(${idx})">×</button>
      </td>
    </tr>`;
  });

  document.getElementById("ingredients").innerHTML=html;

  document.querySelectorAll("#buttons button")
    .forEach((b,i)=>b.classList.toggle("active",i+1===p));
}

/* 編集 */
function editNameStart(i){
  const el = document.getElementById(`name-${i}`);
  const val = baseIngredients[i].name;

  el.innerHTML = `<input value="${val}"
    onblur="editNameEnd(${i}, this.value)"
    onkeydown="if(event.key==='Enter') this.blur()">`;

  el.querySelector("input").focus();
}

function editNameEnd(i,val){
  baseIngredients[i].name = val;
  saveToLocal();
  render(currentPeople);
}

function editAmountStart(i){
  const el = document.getElementById(`amount-${i}`);
  const val = baseIngredients[i].amount;

  el.innerHTML = `<input type="number" value="${val}"
    onblur="editAmountEnd(${i}, this.value)"
    onkeydown="if(event.key==='Enter') this.blur()">`;

  el.querySelector("input").focus();
}

function editAmountEnd(i,val){
  baseIngredients[i].amount = parseFloat(val)||0;
  saveToLocal();
  render(currentPeople);
}

/* 操作 */
function toggleCheck(i){baseIngredients[i].checked=!baseIngredients[i].checked;saveToLocal();render(currentPeople);}
function deleteIngredient(i){baseIngredients.splice(i,1);render(currentPeople);saveToLocal();}
function moveUp(i){if(i===0)return;[baseIngredients[i-1],baseIngredients[i]]=[baseIngredients[i],baseIngredients[i-1]];render(currentPeople);}
function moveDown(i){if(i===baseIngredients.length-1)return;[baseIngredients[i+1],baseIngredients[i]]=[baseIngredients[i],baseIngredients[i+1]];render(currentPeople);}

/* 人数 */
for(let i=1;i<=10;i++){
  const b=document.createElement("button");
  b.textContent=i+"人";
  b.onclick=()=>render(i);
  document.getElementById("buttons").appendChild(b);
}

/* CSV */
function exportCSV(){
  let csv="食材,量,単位\n";
  baseIngredients.forEach(i=>csv+=`${i.name},${i.amount},${i.unit}\n`);

  const menu=document.getElementById("title").value||"レシピ";
  const now=new Date();
  const y=now.getFullYear();
  const m=String(now.getMonth()+1).padStart(2,"0");
  const d=String(now.getDate()).padStart(2,"0");

  const filename=`${menu}_${y}${m}${d}.csv`;

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}

function importCSV(e){
  const f=e.target.files[0];
  const r=new FileReader();
  r.onload=()=>{
    baseIngredients=[];
    r.result.split("\n").slice(1).forEach(l=>{
      const [n,a,u]=l.split(",");
      if(n) baseIngredients.push({name:n,amount:parseFloat(a),unit:u,checked:false});
    });
    render(currentPeople);
    saveToLocal();
  };
  r.readAsText(f);
}

function resetRecipe(){
  if(!confirm("リセットする？")) return;
  baseIngredients=[];
  document.getElementById("title").value="";
  render(1);
  saveToLocal();
}

/* 起動 */
loadFromLocal();
render(currentPeople);

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
