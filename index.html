<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<title>俺のレシピ - 完全版</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  margin: 0;
  max-width: 500px;
  margin: auto;
  background: #f8f9fa;
}

h2 { text-align: center; color: #333; margin-top: 10px; }

.title-area {
  text-align: center;
  margin-bottom: 15px;
}
.title-area input {
  width: 70%;
  padding: 10px;
  font-size: 18px;
  border: 1px solid #ccc;
  border-radius: 8px;
  text-align: center;
}

/* 入力エリア（コンパクト版） */
.input-area {
  display: flex;
  gap: 4px;
  margin-bottom: 15px;
  background: #e1f5fe;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #0288d1;
  align-items: stretch;
}

.input-area input,
.input-area select {
  padding: 10px 4px;
  border: 1px solid #0288d1;
  border-radius: 6px;
  font-size: 15px;
  background: #fff;
  box-sizing: border-box;
}

#name { flex: 3; min-width: 0; }
#amount { flex: 1.5; min-width: 0; text-align: right; }
#unit { flex: 1.5; min-width: 0; }

.input-area button {
  flex: 1.2;
  padding: 0;
  background: #0288d1;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 20px;
  cursor: pointer;
}

.input-area button:active {
  background: #01579b;
  transform: scale(0.95);
}

/* ボタン共通 */
button {
  cursor: pointer;
  transition: transform 0.1s;
}
button:active { transform: translateY(2px); }

/* 人数切り替えボタン */
.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin: 15px 0;
}
.buttons button {
  padding: 10px 0;
  border: 1px solid #bbb; /* 枠線を付けて境界をはっきりさせる */
  border-radius: 10px;
  background: #f0f0f0; /* 少しグレーにして「押せる感」を出す */
  color: #333; /* 文字を濃くして読みやすくする */
  box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
  font-size: 14px;
  font-weight: 500;
}
.buttons button.active {
  background: linear-gradient(145deg, #ff7043, #ff3d00);
  color: white;
  font-weight: bold;
  border: 1px solid #e64a19; /* 選択中は枠線もオレンジ系に */
  box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2); /* 押し込まれたような表現 */
}

/* テーブル */
#ingredients {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  border: 1px solid #999; /* 外枠をしっかり */
}
#ingredients th {
  background: #444; /* ヘッダーを濃くして中身と分ける */
  color: #fff;
  padding: 12px 5px;
  font-size: 15px;
  border: 1px solid #666;
}
#ingredients td {
  padding: 12px 5px;
  border: 1px solid #ccc; /* セルごとの境界線をはっきり */
  text-align: center;
  font-size: 16px; /* 文字を少し大きく */
}

/* 1行おきに色を付けて見やすくする */
#ingredients tr:nth-child(even) {
  background-color: #f2f2f2;
}

/* 食材名を強調 */
td[onclick^="editNameStart"] {
  font-weight: bold;
  color: #000;
  text-align: left !important; /* 食材名は左寄せが見やすい */
  padding-left: 10px !important;
}

.completed {
  background-color: #ddd !important; /* 完了時は背景を暗く */
  color: #888;
  text-decoration: line-through;
}

.completed td {
  border-color: #bbb;
}

/* インライン編集用入力 */
.edit-input {
  width: 90%;
  padding: 8px 4px; /* スマホでタップしやすく少し高さを出す */
  font-size: 18px; /* 入力中の文字を大きく */
  border: 2px solid #2196f3;
  border-radius: 4px;
  box-sizing: border-box;
}

/* 数値入力は右寄せにしてカーソル位置を調整 */
input[type="number"].edit-input {
  text-align: right;
}

/* 操作ボタン */
.op-btn {
  padding: 5px 8px;
  border: none;
  border-radius: 4px;
  color: #fff;
  font-size: 12px;
  margin: 0 1px;
}
.btn-up { background: #66bb6a; }
.btn-down { background: #42a5f5; }
.btn-del { background: #ef5350; }

/* CSV・リセットエリア */
.csv-area {
  display: flex;
  gap: 10px;
  margin-top: 25px;
  margin-bottom: 30px;
}

.csv-area > * {
  flex: 1;
  height: 45px;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.export-btn { background: #43a047; color: white; }
.file-label { background: #1e88e5; color: white; }
.reset-btn { background: #d32f2f; color: white; }

/* スマホ対応 */
@media (max-width: 480px) {
  .input-area { flex-wrap: wrap; }
  .input-area input, .input-area select { flex: 1 1 40%; }
  .input-area button { flex: 1 1 100%; margin-top: 5px; }
}
</style>
</head>

<body>

<h2>俺のレシピ</h2>

<div class="title-area">
  俺の <input id="title" placeholder="ぷりん" oninput="saveToLocal()">
</div>

<div class="input-area">
  <input id="name" placeholder="食材">
  <input id="amount" type="number" step="any" placeholder="量">
  <select id="unit">
    <option>g</option>
    <option>個</option>
    <option>cc</option>
    <option>ml</option>
    <option>本</option>
    <option>枚</option>
  </select>
  <button type="button" onclick="addIngredient()">＋</button>
</div>

<table id="ingredients"></table>
<div class="buttons" id="buttons"></div>

<div class="csv-area">
  <button type="button" class="export-btn" onclick="exportCSV()">ファイル出力</button>
  <label class="file-label">
    ファイル入力
    <input type="file" accept=".csv" onchange="importCSV(event)" hidden>
  </label>
  <button type="button" class="reset-btn" onclick="resetRecipe()">リセット</button>
</div>

<script>
let baseIngredients = []; // 常に「1人分」のデータを保持する
let currentPeople = 1;

/* ===== ローカルストレージ ===== */
function saveToLocal() {
  localStorage.setItem("recipeData_v2", JSON.stringify({
    title: document.getElementById("title").value,
    ingredients: baseIngredients,
    people: currentPeople
  }));
}

function loadFromLocal() {
  const d = JSON.parse(localStorage.getItem("recipeData_v2") || "{}");
  document.getElementById("title").value = d.title || "";
  baseIngredients = d.ingredients || [];
  currentPeople = d.people || 1;
}

/* ===== 食材追加 ===== */
function addIngredient() {
  const nameEl = document.getElementById("name");
  const amountEl = document.getElementById("amount");
  const unitEl = document.getElementById("unit");

  const n = nameEl.value.trim();
  const a = parseFloat(amountEl.value);
  const u = unitEl.value;

  if (!n) return;
  
  // 入力された値を「1人分」に換算して保存する
  const amountPerPerson = isNaN(a) ? 0 : (a / currentPeople);

  baseIngredients.push({
    name: n,
    amount: amountPerPerson,
    unit: u,
    checked: false
  });

  nameEl.value = "";
  amountEl.value = "";

  render(currentPeople);
  saveToLocal();
}

/* ===== 描画処理 ===== */
function render(p) {
  currentPeople = p;
  const table = document.getElementById("ingredients");
  
  let html = `<thead><tr><th></th><th>食材</th><th>量</th><th>操作</th></tr></thead><tbody>`;

  baseIngredients.forEach((item, idx) => {
    // 表示用の計算（1人分 × 指定人数）
    let displayAmount = item.amount * p;
    // 小数点第2位まで（整数の場合はそのまま）
    const formattedAmount = displayAmount === 0 ? "" : (displayAmount % 1 === 0 ? displayAmount : displayAmount.toFixed(2).replace(/\.?0+$/, ""));

    html += `
    <tr class="${item.checked ? 'completed' : ''}">
      <td><input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${idx})"></td>
      
      <td onclick="editNameStart(${idx})">
        <span id="name-${idx}">${escapeHtml(item.name)}</span>
      </td>
      
      <td onclick="editAmountStart(${idx})">
        <span id="amount-${idx}">${formattedAmount} ${item.unit}</span>
      </td>
      
      <td>
        <button type="button" class="op-btn btn-up" onclick="moveUp(${idx})">↑</button>
        <button type="button" class="op-btn btn-down" onclick="moveDown(${idx})">↓</button>
        <button type="button" class="op-btn btn-del" onclick="deleteIngredient(${idx})">×</button>
      </td>
    </tr>`;
  });

  html += `</tbody>`;
  table.innerHTML = html;

  // 人数ボタンのアクティブ表示切り替え
  document.querySelectorAll("#buttons button").forEach((btn, i) => {
    btn.classList.toggle("active", (i + 1) === p);
  });
}

/* ===== インライン編集（修正版：計算不整合対策） ===== */
function editNameStart(i) {
  const el = document.getElementById(`name-${i}`);
  const val = baseIngredients[i].name;
  el.onclick = null;
  el.innerHTML = `<input class="edit-input" value="${escapeHtml(val)}" 
    onfocus="this.select()" 
    onblur="editNameEnd(${i}, this.value)" 
    onkeydown="if(event.key==='Enter') { event.preventDefault(); this.blur(); }">`;
  
  const input = el.querySelector("input");
  input.focus();
  setTimeout(() => input.select(), 50);
}

function editNameEnd(i, val) {
  baseIngredients[i].name = val.trim() || baseIngredients[i].name;
  saveToLocal();
  render(currentPeople);
}

function editAmountStart(i) {
  const el = document.getElementById(`amount-${i}`);
  const currentDisplayVal = baseIngredients[i].amount * currentPeople;
  const formattedVal = currentDisplayVal % 1 === 0 ? currentDisplayVal : currentDisplayVal.toFixed(2).replace(/\.?0+$/, "");
  
  el.onclick = null;
  // onclick="this.select()" を追加して、タップ時に全選択されるようにする
  el.innerHTML = `<input type="number" step="any" class="edit-input" value="${formattedVal}" 
    onfocus="this.select()" 
    onblur="editAmountEnd(${i}, this.value)" 
    onkeydown="if(event.key==='Enter') { event.preventDefault(); this.blur(); }">`;
  
  const input = el.querySelector("input");
  input.focus();
  // スマホ対策：少し遅らせて select() を実行すると確実に全選択される
  setTimeout(() => input.select(), 50);
}

function editAmountEnd(i, val) {
  const inputVal = parseFloat(val);
  if (!isNaN(inputVal)) {
    // 【重要】入力された値を現在の人数で割って「1人分」として保存する
    baseIngredients[i].amount = inputVal / currentPeople;
  }
  saveToLocal();
  render(currentPeople);
}

/* ===== 操作系 ===== */
function toggleCheck(i) {
  baseIngredients[i].checked = !baseIngredients[i].checked;
  saveToLocal();
  render(currentPeople);
}

function deleteIngredient(i) {
  if (!confirm("この食材を削除しますか？")) return;
  baseIngredients.splice(i, 1);
  saveToLocal();
  render(currentPeople);
}

function moveUp(i) {
  if (i === 0) return;
  [baseIngredients[i - 1], baseIngredients[i]] = [baseIngredients[i], baseIngredients[i - 1]];
  saveToLocal();
  render(currentPeople);
}

function moveDown(i) {
  if (i === baseIngredients.length - 1) return;
  [baseIngredients[i + 1], baseIngredients[i]] = [baseIngredients[i], baseIngredients[i + 1]];
  saveToLocal();
  render(currentPeople);
}

/* ===== 人数ボタン生成 ===== */
const btnContainer = document.getElementById("buttons");
for (let i = 1; i <= 10; i++) {
  const b = document.createElement("button");
  b.type = "button";
  b.textContent = i + "人";
  b.onclick = () => {
    currentPeople = i;
    saveToLocal();
    render(i);
  };
  btnContainer.appendChild(b);
}

/* ===== CSV連携（互換性・文字化け対策版） ===== */
function exportCSV() {
  // Excel用BOM
  const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
  let csv = "食材,1人分の量,単位\n";
  
  baseIngredients.forEach(item => {
    // カンマや改行を含むデータへの対策
    const n = `"${item.name.replace(/"/g, '""')}"`;
    const a = item.amount;
    const u = `"${item.unit.replace(/"/g, '""')}"`;
    csv += `${n},${a},${u}\n`;
  });

  const title = document.getElementById("title").value || "レシピ";
  const filename = `${title}_${new Date().toISOString().slice(0,10)}.csv`;

  const blob = new Blob([bom, csv], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const text = event.target.result;
      const lines = text.split(/\r?\n/);
      const newIngredients = [];

      // 1行目はヘッダーなのでスキップ
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        // 簡易的なCSVパース（カンマ分割）
        // ※より厳密なパースが必要な場合は正規表現を使用
        const parts = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
        if (parts.length >= 3) {
          const n = parts[0].replace(/^"|"$/g, '').replace(/""/g, '"');
          const a = parseFloat(parts[1]);
          const u = parts[2].replace(/^"|"$/g, '').replace(/""/g, '"');
          
          newIngredients.push({
            name: n,
            amount: isNaN(a) ? 0 : a,
            unit: u,
            checked: false
          });
        }
      }

      if (newIngredients.length > 0) {
        if (confirm(`${newIngredients.length}件の食材を読み込みますか？（現在のリストは上書きされます）`)) {
          baseIngredients = newIngredients;
          saveToLocal();
          render(currentPeople);
        }
      } else {
        alert("有効なデータが見つかりませんでした。");
      }
    } catch (err) {
      console.error(err);
      alert("ファイルの読み込み中にエラーが発生しました。");
    }
    // 同じファイルを再度選択できるようにリセット
    e.target.value = "";
  };
  reader.readAsText(file);
}

function resetRecipe() {
  if (!confirm("レシピをリセットして全消去しますか？")) return;
  baseIngredients = [];
  document.getElementById("title").value = "";
  currentPeople = 1;
  saveToLocal();
  render(1);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

/* ===== 起動 ===== */
loadFromLocal();
render(currentPeople);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>

</body>
</html>
